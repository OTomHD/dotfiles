windowrule{
	name = Game-Rules-Class-Match
	match:class = ^steam_app_.*|gamescope|com.heroicgameslauncher.hgl|steam$
	workspace = 10 silent
}
windowrule{
  name = Game-Rules-XdgTag-Match
  match:xdg_tag = ^proton-game$"
  workspace = 10 silent
  }

windowrule{
	name = Steam-Set-Friends_list-Floating
	match:initial_title = ^Friends List$
	float = true
}

windowrule{
	name = Move-Communication
	match:class = ^discord|vesktop|TeamSpeak 3$
	workspace = 9 silent
}

windowrule{
	name = Kitty-Opacity
	match:class = ^kitty$
	opacity = 0.90
}


workspace = 10, monitor:DP-1                 #Set workspace 10 to Monitor 1
workspace = 9, monitor:DP-2         #Set workspace 9 to Monitor 2

